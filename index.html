<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UniMate</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
      overflow: hidden;
    }

    .container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      flex-direction: column;
    }

    h1 {
      font-size: 3.5rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #22c55e, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .btn {
      padding: 16px 32px;
      font-size: 18px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(90deg, #22c55e, #4ade80);
      color: black;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 20px rgba(34,197,94,0.7);
    }

    .tag {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 14px;
      opacity: 0.6;
    }

    .bg {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(34,197,94,0.3), transparent);
      border-radius: 50%;
      filter: blur(120px);
      animation: float 6s infinite alternate;
    }

    @keyframes float {
      from { transform: translateY(-50px); }
      to { transform: translateY(50px); }
    }
  </style>
</head>

<body>

  <div class="bg"></div>

  <div class="tag">Built at Hackathon ⚡</div>

  <div class="container">
    <h1>UniMate 🤖</h1>
    <p>Your AI Study Buddy inside Telegram</p>

    <button class="btn" onclick="openBot()">
      🚀 Start on Telegram
    </button>
  </div>

  <script>
    function openBot() {
      window.open("https://t.me/unimatelaunch_Bot", "_blank");
    }
  </script>

</body>
</html>
